info:
  title: Transaction Describer
  version: 0.0.0
  license:
    name: MIT
    url: ../LICENSE
openapi: 3.0.4
servers:
  - description: Development Server
    url: http://127.0.0.1:35183
paths:
  /api/v0/addresses/{address}:
    parameters:
      - in: path
        name: address
        description: Bech32 Cardano address
        schema:
          type: string
        required: true
      - in: query
        name: count
        description: The number of transactions
        schema:
          type: integer
          minimum: 1
          maximum: 10
          default: 5
        required: false
    get:
      summary: Describe Address Transactions
      description: Get the descriptions of the last number of transactions of an address.
      responses:
        '200':
          description: >-
            Return the manifest for the last number of transactions of the
            requested address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manifest'
        '400': &ref_0
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429': &ref_1
          description: Usage limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500': &ref_2
          description: Internal Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      operationId: v0_addresses
  /api/v0/addresses/{address}/txs/{hash}:
    parameters:
      - in: path
        name: address
        description: Bech32 Cardano Address
        schema:
          type: string
        required: true
      - in: path
        name: hash
        description: Cardano Transaction Hash
        schema:
          type: string
        required: true
    get:
      summary: Describe Specific Address Transaction
      description: Get the manifest for a specific transaction of an address.
      responses:
        '200':
          description: >-
            Return the manifest for the requested transaction from the point of
            view of the requested address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Manifest'
        '400': *ref_0
        '429': *ref_1
        '500': *ref_2
      operationId: v0_addresses_txs
  /api/v0/stats:
    get:
      summary: Statistics
      description: >-
        Get the statistics of the service, such as how many transaction
        categories and dApps there are.
      responses:
        '200':
          description: Return the statistics of the service
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Stats'
        '400': *ref_0
        '429': *ref_1
        '500': *ref_2
      operationId: v0_stats
components:
  schemas:
    Stats:
      title: Service Statistics
      description: >-
        The statistics of the service, such as how many transaction categories
        and dApps there are.
      type: object
      properties:
        category:
          title: Transaction Category
          description: Transaction categories supported by the service.
          type: object
          nullable: false
          properties:
            names:
              title: Category Names
              description: Transaction category names.
              type: array
              nullable: false
              items:
                type: string
                uniqueItems: true
            count:
              title: Category Count
              description: Transaction category count.
              type: integer
              nullable: false
          required:
            - names
            - count
        merchant:
          title: dApp Projects
          description: Supported dApp projects recognized by the service.
          type: object
          nullable: false
          properties:
            names:
              title: Project Names
              description: dApp project names.
              type: array
              nullable: false
              items:
                type: string
                uniqueItems: true
            count:
              title: Project Count
              description: dApp project count.
              type: integer
              nullable: false
          required:
            - names
            - count
      required:
        - category
        - merchant
