    Asset:
      type: object
      properties:
        currency:
          type: string
          nullable: false
          example: ADA
        amount:
          type: number
          nullable: false
      required:
        - currency
        - amount
    Account:
      type: object
      properties:
        address:
          title: Bech32 Cardano Address
          type: string
          nullable: false
          format: addr1_...
          example: addr1_...
        role:
          description: Role associated with during the particular transaction.
          type: string
          nullable: false
          format: User Address | Unknown Address | Unknown Script | etc.
          example: User Address | Unknown Address | Unknown Script | etc.
        total:
          description: >-
            The aggregate amount of the movement of values during the particular
            transaction.
          type: array
          nullable: false
          items:
            $ref: '#/components/schemas/Asset'
      required:
        - address
        - role
        - total
    Manifest:
      type: object
      properties:
        version:
          title: Version Number
          description: The manifest format version number.
          type: integer
          nullable: false
        id:
          title: Manifest UUID
          description: The manifest UUID.
          type: string
          nullable: false
          example: 12345678-1234-1234-1234-1234567890ab
        institution:
          title: Institution Info
          description: The information about the institution.
          type: object
          nullable: false
          properties:
            name:
              title: Institution Name
              description: The name of the institution.
              type: string
              nullable: false
              example: Cardano
            network:
              title: Institution Network
              description: The network of the institution.
              type: string
              nullable: false
              example: Mainnet
          required:
            - name
            - network
        transactions:
          title: Transactions Info
          description: The information about the transactions.
          type: array
          nullable: false
          items:
            title: Transaction Info
            description: The information about a transaction.
            type: object
            nullable: false
            properties:
              transaction_id:
                title: Transaction Hash
                description: >-
                  The transaction hash that can be queried on a Cardano
                  blockchain explorer.
                type: string
                nullable: false
                example: Tx Hash
              timestamp:
                title: Timestamp
                description: The transaction timestamp in epoch millisecond.
                type: integer
                nullable: false
              type:
                title: Transaction Type
                description: The value is one of the transaction categories.
                type: string
                nullable: false
                example: undefined
              description:
                title: Transaction Description
                description: The human-readable description of the transaction.
                type: string
                nullable: false
                example: undefined
              confidence:
                title: Confidence Score
                description: Transaction type/description confidence score.
                type: integer
                nullable: true
                minimum: 0
                maximum: 100
              accounts:
                title: Transaction Accounts
                description: Accounts associated with the particular transaction.
                type: object
                nullable: false
                properties:
                  user:
                    type: array
                    nullable: false
                    items:
                      $ref: '#/components/schemas/Account'
                  other:
                    type: array
                    nullable: false
                    items:
                      $ref: '#/components/schemas/Account'
                required:
                  - user
                  - other
              withdrawal_amount:
                $ref: '#/components/schemas/Asset'
              network_fee:
                $ref: '#/components/schemas/Asset'
              metadata:
                title: Transaction Metadata
                description: Metadata attached during the particular transaction, if any.
                type: array
                nullable: false
                items:
                  type: object
            required:
              - transaction_id
              - timestamp
              - type
              - description
              - confidence
              - accounts
              - network_fee
              - metadata
      required:
        - version
        - id
        - institution
        - transactions
    Error:
      type: object
      properties:
        error:
          title: Error Message
          description: Describes the error reason.
          type: string
          nullable: false
      required:
        - error
security: []
